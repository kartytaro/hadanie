    { id:"nine_of_wands", name:"Nine of Wands", nameRu:"Девятка Жезлов", n:"9",
      i:[{s:"Mathers",y:1888,t:"Order, discipline, good arrangement, disposition.",tR:"Порядок, дисциплина, хорошее устройство, расположение.",r:"Obstacles, crosses, delay, displeasure.",rR:"Препятствия, невзгоды, задержка, неудовольствие."},{s:"Golden Dawn",y:1888,t:"Lord of Great Strength. Tremendous and steady force that cannot be shaken. Herculean strength. Great success, but with strife and energy.",tR:"Владыка Великой Силы. Огромная и неколебимая мощь. Геркулесова сила. Великий успех, но с борьбой и затратой энергии."},{s:"Waite",y:1910,t:"Strength in opposition. If attacked, the person will meet an onslaught boldly. Delay, suspension, adjournment.",tR:"Сила в противостоянии. При нападении человек встретит натиск смело. Задержка, приостановка, отсрочка.",r:"Obstacles, adversity, calamity.",rR:"Препятствия, невзгоды, бедствие."}]},
    { id:"ten_of_wands", name:"Ten of Wands", nameRu:"Десятка Жезлов", n:"10",
      i:[{s:"Mathers",y:1888,t:"Confidence, security, honor, good faith.",tR:"Уверенность, безопасность, честь, добрая вера.",r:"Treachery, subterfuge, duplicity, bar.",rR:"Предательство, уловка, двуличие, преграда."},{s:"Golden Dawn",y:1888,t:"Lord of Oppression. Cruel and overbearing force and energy, but applied only to selfish and material ends.",tR:"Владыка Подавления. Жестокая и деспотичная сила и энергия, но применяемая лишь к корыстным и материальным целям."},{s:"Waite",y:1910,t:"Oppression simply, also fortune, gain, any kind of success, and also the oppression of these things. A card of false-seeming, disguise, and perfidy.",tR:"Подавление в чистом виде, а также удача, нажива, любой вид успеха и также гнёт этих вещей. Карта ложной видимости, маскировки и вероломства.",r:"Contrarieties, difficulties, intrigues, and their analogies.",rR:"Противоречия, трудности, интриги и им подобное."}]},
    { id:"page_of_wands", name:"Page of Wands", nameRu:"Паж Жезлов", n:"Pg",
      i:[{s:"Mathers",y:1888,t:"A good stranger, good news, pleasure, satisfaction.",tR:"Добрый незнакомец, хорошие вести, удовольствие, удовлетворение.",r:"Ill news, displeasure, chagrin, worry.",rR:"Дурные вести, неудовольствие, огорчение, беспокойство."},{s:"Golden Dawn",y:1888,t:"Princess of the Shining Flame. Brilliance, courage, beauty, force, sudden in anger, or love, desire of power, enthusiasm.",tR:"Принцесса Сияющего Пламени. Блеск, отвага, красота, сила, внезапность в гневе или в любви, жажда власти, воодушевление."},{s:"Waite",y:1910,t:"Dark young man, faithful, a lover, an envoy, a postman. He has the chief qualities of his suit.",tR:"Смуглый юноша, верный, возлюбленный, посланник, почтальон. Обладает главными качествами своей масти.",r:"Anecdotes, announcements, evil news. Also indecision and the instability that accompanies it.",rR:"Анекдоты, объявления, дурные вести. Также нерешительность и сопутствующая ей неустойчивость."}]},
    { id:"knight_of_wands", name:"Knight of Wands", nameRu:"Рыцарь Жезлов", n:"Kn",
      i:[{s:"Mathers",y:1888,t:"Departure, separation, disunion.",tR:"Отъезд, разлука, разъединение.",r:"Rupture, discord, quarrel.",rR:"Разрыв, раздор, ссора."},{s:"Golden Dawn",y:1888,t:"The Prince of the Chariot of Fire. Swift, strong, hasty, rather violent, yet just and generous, noble and scorning meanness.",tR:"Принц Колесницы Огня. Стремительный, сильный, поспешный, довольно неистовый, но справедливый и щедрый, благородный и презирающий низость."},{s:"Waite",y:1910,t:"Departure, absence, flight, emigration. A dark young man, friendly. Change of residence.",tR:"Отъезд, отсутствие, бегство, эмиграция. Смуглый молодой человек, дружелюбный. Перемена места жительства.",r:"Rupture, division, interruption, discord.",rR:"Разрыв, разделение, перерыв, раздор."}]},
    { id:"queen_of_wands", name:"Queen of Wands", nameRu:"Королева Жезлов", n:"Q",
      i:[{s:"Mathers",y:1888,t:"A woman living in the country. Lady of the manor, love of money, avarice, usury.",tR:"Женщина, живущая в деревне. Хозяйка поместья, любовь к деньгам, скупость, ростовщичество.",r:"A good and virtuous woman, but strict and economical. Obstacles, resistance, opposition.",rR:"Добрая и добродетельная женщина, но строгая и бережливая. Препятствия, сопротивление, противодействие."},{s:"Golden Dawn",y:1888,t:"Queen of the Thrones of Flame. Adaptability, steady force applied to an object. Great attractive power, power of command.",tR:"Королева Тронов Пламени. Приспособляемость, постоянная сила, направленная на объект. Великая притягательная сила, власть повелевать."},{s:"Waite",y:1910,t:"A dark woman, countrywoman, friendly, chaste, loving, honorable. Love of money. A good harvest.",tR:"Смуглая женщина, деревенская жительница, дружелюбная, целомудренная, любящая, почтенная. Любовь к деньгам. Хороший урожай.",r:"Good, economical, obliging, serviceable. Opposition, jealousy, even deceit and infidelity.",rR:"Добрая, бережливая, услужливая, полезная. Противодействие, ревность, даже обман и неверность."}]},
    { id:"king_of_wands", name:"King of Wands", nameRu:"Король Жезлов", n:"K",
      i:[{s:"Mathers",y:1888,t:"Man living in the country, country gentleman. Knowledge, education.",tR:"Человек, живущий в деревне, сельский дворянин. Знания, образование.",r:"A naturally good but severe man. Counsel, advice, deliberation.",rR:"Человек от природы добрый, но суровый. Совет, наставление, обсуждение."},{s:"Golden Dawn",y:1888,t:"The Lord of the Flame and the Lightning. King of the Spirits of Fire. Active, generous, fierce, sudden, and impetuous.",tR:"Владыка Пламени и Молнии. Король Духов Огня. Деятельный, щедрый, неистовый, внезапный и стремительный."},{s:"Waite",y:1910,t:"Dark man, friendly, countryman, generally married, honest, and conscientious. Honesty, and may mean news concerning an unexpected heritage.",tR:"Смуглый мужчина, дружелюбный, сельский житель, обычно женат, честный и добросовестный. Честность, а также может означать вести о неожиданном наследстве.",r:"Good, but severe. August, yet tolerant. Also advice that should be followed.",rR:"Добрый, но суровый. Величественный, но терпимый. Также совет, которому следует последовать."}]}

  ...[
    { id:"ace_of_cups", name:"Ace of Cups", nameRu:"Туз Кубков", n:"A",

    { id:"two_of_cups", name:"Two of Cups", nameRu:"Двойка Кубков", n:"2",
      i:[{s:"Mathers",y:1888,t:"Love, attachment, friendship, sincerity, affection.",tR:"Любовь, привязанность, дружба, искренность, нежность.",r:"Crossed desires, obstacles, opposition, hindrance.",rR:"Несбывшиеся желания, препятствия, противодействие, помеха."},{s:"Golden Dawn",y:1888,t:"Lord of Love. Harmony of masculine and feminine united. Harmony, pleasure, mirth, subtlety.",tR:"Владыка Любви. Гармония мужского и женского в единстве. Гармония, удовольствие, веселье, тонкость."},{s:"Waite",y:1910,t:"Love, passion, friendship, affinity, union, concord, sympathy.",tR:"Любовь, страсть, дружба, сродство, союз, согласие, симпатия.",r:"Passion.",rR:"Страсть."}]},
    { id:"three_of_cups", name:"Three of Cups", nameRu:"Тройка Кубков", n:"3",
      i:[{s:"Mathers",y:1888,t:"Success, triumph, victory, favorable issue.",tR:"Успех, триумф, победа, благоприятный исход.",r:"Expedition of business, quickness, celerity, vigilance.",rR:"Быстрое завершение дел, скорость, расторопность, бдительность."},{s:"Golden Dawn",y:1888,t:"Lord of Abundance. Abundance, plenty, success, pleasure, sensuality, passive success, good luck and fortune.",tR:"Владыка Изобилия. Изобилие, достаток, успех, удовольствие, чувственность, пассивный успех, удача и счастье."},{s:"Waite",y:1910,t:"The conclusion of any matter in plenty, perfection, and merriment. Happy outcome, victory, fulfillment, solace, healing.",tR:"Завершение любого дела в изобилии, совершенстве и веселии. Счастливый исход, победа, исполнение, утешение, исцеление.",r:"Expedition, dispatch, achievement, end, excess in physical enjoyment.",rR:"Быстрота, отправка, достижение, конец, излишество в телесных наслаждениях."}]},
    { id:"four_of_cups", name:"Four of Cups", nameRu:"Четвёрка Кубков", n:"4",
      i:[{s:"Mathers",y:1888,t:"Ennui, displeasure, discontent, dissatisfaction.",tR:"Скука, неудовольствие, недовольство, неудовлетворённость.",r:"New acquaintance, conjecture, sign, presentiment.",rR:"Новое знакомство, догадка, знак, предчувствие."},{s:"Golden Dawn",y:1888,t:"Lord of Blended Pleasure. Success or pleasure approaching its end. A stationary period in happiness that may not continue.",tR:"Владыка Смешанного Удовольствия. Успех или удовольствие, приближающиеся к концу. Застойный период счастья, которое может не продлиться."},{s:"Waite",y:1910,t:"Weariness, disgust, aversion, imaginary vexations, blended pleasure, contrarieties.",tR:"Усталость, отвращение, неприязнь, воображаемые досады, смешанное удовольствие, противоречия.",r:"Novelty, presage, new instruction, new relations, presentiment.",rR:"Новизна, предзнаменование, новое наставление, новые связи, предчувствие."}]},
    { id:"five_of_cups", name:"Five of Cups", nameRu:"Пятёрка Кубков", n:"5",
      i:[{s:"Mathers",y:1888,t:"Union, junction, marriage, inheritance.",tR:"Союз, соединение, брак, наследство.",r:"Arrival, return, news, surprise, false projects.",rR:"Прибытие, возвращение, новости, сюрприз, ложные замыслы."},{s:"Golden Dawn",y:1888,t:"Lord of Loss in Pleasure. Death or end of pleasures: disappointment, sorrow and loss in those things from which pleasure is expected.",tR:"Владыка Утраты в Удовольствии. Смерть или конец удовольствий: разочарование, печаль и утрата в том, от чего ожидалось удовольствие."},{s:"Waite",y:1910,t:"A card of loss. Inheritance, patrimony, legacies, gifts, but not according to expectations. With some, a card of marriage, but not without bitterness.",tR:"Карта утраты. Наследство, наследие, дары, но не по ожиданиям. Для некоторых — карта брака, но не без горечи.",r:"News, alliances, affinity, consanguinity, ancestry, false projects.",rR:"Новости, союзы, сродство, кровное родство, происхождение, ложные замыслы."}]},
    { id:"six_of_cups", name:"Six of Cups", nameRu:"Шестёрка Кубков", n:"6",
      i:[{s:"Mathers",y:1888,t:"The past, passed by, faded, vanished, disappeared.",tR:"Прошлое, минувшее, угасшее, исчезнувшее.",r:"The future, that which is to come, shortly, soon.",rR:"Будущее, то, что грядёт, вскоре, скоро."},{s:"Golden Dawn",y:1888,t:"Lord of Pleasure. Commencement of steady increase and pleasure, but commencement only.",tR:"Владыка Удовольствия. Начало устойчивого роста и удовольствия, но лишь начало."},{s:"Waite",y:1910,t:"Past and memories, looking back, as for example, on childhood, happiness, enjoyment from the past, pleasant memories.",tR:"Прошлое и воспоминания, взгляд назад, например на детство, счастье, радость из прошлого, приятные воспоминания.",r:"The future, renewal, that which will come to pass presently. Inheritance to fall in quickly.",rR:"Будущее, обновление, то, что вскоре свершится. Наследство, которое скоро достанется."}]},
    { id:"seven_of_cups", name:"Seven of Cups", nameRu:"Семёрка Кубков", n:"7",
      i:[{s:"Mathers",y:1888,t:"Idea, sentiment, reflection.",tR:"Идея, чувство, размышление.",r:"Plan, design, resolution, decision.",rR:"План, замысел, решимость, решение."},{s:"Golden Dawn",y:1888,t:"Lord of Illusionary Success. Possibly victory, but neutralized by the supineness of the person. Illusionary success. Deception in the moment of apparent victory.",tR:"Владыка Иллюзорного Успеха. Возможная победа, но обесцененная бездействием человека. Иллюзорный успех. Обман в момент кажущейся победы."},{s:"Waite",y:1910,t:"Fairy favors, images of reflection, sentiment, imagination. Some attainment but nothing permanent is suggested.",tR:"Волшебные дары, образы размышления, чувства, воображение. Некоторое достижение, но ничего постоянного.",r:"Will, determination, project.",rR:"Воля, решимость, замысел."}]},
    { id:"eight_of_cups", name:"Eight of Cups", nameRu:"Восьмёрка Кубков", n:"8",
      i:[{s:"Mathers",y:1888,t:"A fair girl, friendship, attachment, tenderness.",tR:"Светлая девушка, дружба, привязанность, нежность.",r:"Gaiety, feasting, joy, pleasure.",rR:"Веселье, пиршество, радость, удовольствие."},{s:"Golden Dawn",y:1888,t:"Lord of Abandoned Success. Temporary success, but without further result. Things thrown aside as soon as gained. Journeying from place to place.",tR:"Владыка Покинутого Успеха. Временный успех, но без дальнейшего результата. Обретённое тут же отбрасывается. Странствие с места на место."},{s:"Waite",y:1910,t:"Decline of a matter, or that a matter thought important is really of slight consequence.",tR:"Упадок дела, или же то, что считалось важным, оказывается незначительным.",r:"Great joy, happiness, feasting, perfect satisfaction.",rR:"Великая радость, счастье, пиршество, полное удовлетворение."}]},
    { id:"nine_of_cups", name:"Nine of Cups", nameRu:"Девятка Кубков", n:"9",
      i:[{s:"Mathers",y:1888,t:"Victory, advantage, success, triumph, difficulties surmounted.",tR:"Победа, преимущество, успех, триумф, преодолённые трудности.",r:"Faults, errors, mistakes, imperfections.",rR:"Недостатки, ошибки, промахи, несовершенства."},{s:"Golden Dawn",y:1888,t:"Lord of Material Happiness. Complete and perfect realization of pleasure and happiness almost perfect.",tR:"Владыка Материального Счастья. Полное и совершенное осуществление удовольствия и счастья, почти безупречное."},{s:"Waite",y:1910,t:"Concord, contentment, physical well-being, victory, success, advantage, satisfaction.",tR:"Согласие, довольство, физическое благополучие, победа, успех, преимущество, удовлетворение.",r:"Truth, loyalty, liberty, good business, but the readings vary and include mistakes and imperfections.",rR:"Истина, верность, свобода, хорошие дела, но толкования разнятся и включают ошибки и несовершенства."}]},
    { id:"ten_of_cups", name:"Ten of Cups", nameRu:"Десятка Кубков", n:"10",
      i:[{s:"Mathers",y:1888,t:"The town wherein one resides, honor, consideration, esteem, virtue, glory, reputation.",tR:"Город, в котором живёшь, честь, уважение, почтение, добродетель, слава, репутация.",r:"Combat, strife, opposition, differences, dispute.",rR:"Борьба, раздор, противодействие, разногласия, спор."},{s:"Golden Dawn",y:1888,t:"Lord of Perfected Success. Permanent and lasting success, happiness because inspired from above.",tR:"Владыка Совершенного Успеха. Постоянный и прочный успех, счастье, вдохновлённое свыше."},{s:"Waite",y:1910,t:"Contentment, repose of the entire heart, the perfection of that state, also the perfection of human love and friendship.",tR:"Довольство, покой всего сердца, совершенство этого состояния, а также совершенство человеческой любви и дружбы.",r:"Repose of the false heart, indignation, violence, sorrow.",rR:"Покой лживого сердца, негодование, насилие, скорбь."}]},
    { id:"page_of_cups", name:"Page of Cups", nameRu:"Паж Кубков", n:"Pg",

    { id:"knight_of_cups", name:"Knight of Cups", nameRu:"Рыцарь Кубков", n:"Kn",
      i:[{s:"Mathers",y:1888,t:"Arrival, approach, advance.",tR:"Прибытие, приближение, продвижение.",r:"Duplicity, abuse of confidence, fraud, cunning.",rR:"Двуличие, злоупотребление доверием, мошенничество, коварство."},{s:"Golden Dawn",y:1888,t:"Prince of the Chariot of the Waters. Subtle, violent, crafty, and artistic. Powerful for good or evil.",tR:"Принц Колесницы Вод. Тонкий, неистовый, хитрый и артистичный. Могущественный во благо или во зло."},{s:"Waite",y:1910,t:"Arrival, approach, sometimes that of a messenger. Advances, proposition, demeanor, invitation, incitement.",tR:"Прибытие, приближение, иногда посланника. Продвижение, предложение, поведение, приглашение, побуждение.",r:"Trickery, artifice, subtlety, swindling, duplicity, fraud.",rR:"Обман, хитрость, тонкость, мошенничество, двуличие, подлог."}]},
    { id:"queen_of_cups", name:"Queen of Cups", nameRu:"Королева Кубков", n:"Q",
      i:[{s:"Mathers",y:1888,t:"A fair woman, success, happiness, advantage, pleasure.",tR:"Светлая женщина, успех, счастье, преимущество, удовольствие.",r:"A woman in good position, but intermeddling. Success, but with some attendant trouble.",rR:"Женщина в хорошем положении, но вмешивающаяся в чужие дела. Успех, но с сопутствующими неприятностями."},{s:"Golden Dawn",y:1888,t:"Queen of the Thrones of the Waters. Imaginative, poetic, kind, yet not willing to take much trouble for another.",tR:"Королева Тронов Вод. С богатым воображением, поэтичная, добрая, но не склонная слишком утруждать себя ради другого."},{s:"Waite",y:1910,t:"A fair woman, honest, devoted, who will do service to the inquirer. Loving intelligence. Success, happiness, pleasure.",tR:"Светлая женщина, честная, преданная, которая окажет услугу вопрошающему. Любящий ум. Успех, счастье, удовольствие.",r:"Good woman, otherwise not to be trusted. Vice, dishonor, depravity.",rR:"Хорошая женщина, но в ином случае — ненадёжная. Порок, бесчестие, развращённость."}]},
    { id:"king_of_cups", name:"King of Cups", nameRu:"Король Кубков", n:"K",
      i:[{s:"Mathers",y:1888,t:"A fair-haired man, goodness, kindness, liberality, generosity.",tR:"Светловолосый мужчина, доброта, милосердие, щедрость, великодушие.",r:"A man of good position, but shifty in his dealings. Distrust, doubt, suspicion.",rR:"Мужчина в хорошем положении, но изворотливый в делах. Недоверие, сомнение, подозрение."},{s:"Golden Dawn",y:1888,t:"Lord of the Waves and the Waters. King of the Hosts of the Sea. Graceful, poetic, Venusian, indolent, but enthusiastic if roused.",tR:"Владыка Волн и Вод. Король Воинств Моря. Грациозный, поэтичный, венерианский, ленивый, но воодушевлённый, если пробуждён."},{s:"Waite",y:1910,t:"Fair man, a man of business, law, or divinity. Responsible, disposed to oblige the inquirer. Equity, art and science.",tR:"Светлый мужчина, деловой человек, юрист или священнослужитель. Ответственный, расположенный помочь вопрошающему. Справедливость, искусство и наука.",r:"Dishonest, double-dealing man. Roguery, exaction, injustice, vice, scandal, loss.",rR:"Нечестный, двуличный мужчина. Плутовство, вымогательство, несправедливость, порок, скандал, утрата."}]}

  // ═══════════════ MINOR ARCANA — SWORDS ═══════════════
  ...[
    { id:"ace_of_swords", name:"Ace of Swords", nameRu:"Туз Мечей", n:"A",
      i:[{s:"Mathers",y:1888,t:"Triumph, fecundity, fertility, prosperity.",tR:"Триумф, плодовитость, плодородие, процветание.",r:"Embarrassment, foolish and hopeless love, obstacle, hindrance.",rR:"Затруднение, глупая и безнадёжная любовь, препятствие, помеха."},{s:"Golden Dawn",y:1888,t:"The Root of the Powers of Air. Very great power for good or evil, but invoked. Affirmation of Justice, upholding divine authority.",tR:"Корень Сил Воздуха. Огромная сила к добру или ко злу, но призванная. Утверждение Справедливости, поддержание божественной власти."},{s:"Waite",y:1910,t:"Triumph, the excessive degree in everything, conquest, the triumph of force. A card of great force, in love as well as hatred.",tR:"Триумф, чрезмерная степень во всём, завоевание, торжество силы. Карта великой силы, как в любви, так и в ненависти.",r:"The same, but the results are disastrous. Conception, childbirth, augmentation, multiplicity.",rR:"То же, но с катастрофическими последствиями. Зачатие, роды, приумножение, множественность."}]},
    { id:"two_of_swords", name:"Two of Swords", nameRu:"Двойка Мечей", n:"2",
      i:[{s:"Mathers",y:1888,t:"Friendship, valor, firmness, courage.",tR:"Дружба, доблесть, твёрдость, мужество.",r:"False friends, treachery, lies.",rR:"Ложные друзья, предательство, ложь."},{s:"Golden Dawn",y:1888,t:"Lord of Peace Restored. Contradictory characteristics in the same nature. Strength through suffering. Peace restored, truce.",tR:"Владыка Восстановленного Мира. Противоречивые качества в одной натуре. Сила через страдание. Восстановленный мир, перемирие."},{s:"Waite",y:1910,t:"Conformity and the equipoise that it suggests, courage, friendship, concord in a state of arms, affection, intimacy.",tR:"Согласие и равновесие, которое оно предполагает, мужество, дружба, согласие в готовности к бою, привязанность, близость.",r:"Imposture, falsehood, duplicity, disloyalty, dealings with rogues.",rR:"Самозванство, ложь, двуличие, неверность, дела с мошенниками."}]},
    { id:"three_of_swords", name:"Three of Swords", nameRu:"Тройка Мечей", n:"3",
      i:[{s:"Mathers",y:1888,t:"A nun, separation, removal, rupture, quarrel.",tR:"Монахиня, разлука, удаление, разрыв, ссора.",r:"Error, confusion, misrule, disorder.",rR:"Ошибка, замешательство, плохое управление, беспорядок."},{s:"Golden Dawn",y:1888,t:"Lord of Sorrow. Disruption, interruption, separation, quarreling, sowing of discord and strife, sorrow, tears.",tR:"Владыка Скорби. Разрушение, прерывание, разлука, ссоры, сеяние раздора и вражды, скорбь, слёзы."},{s:"Waite",y:1910,t:"Removal, absence, delay, division, rupture, dispersion, for a woman the flight of her lover.",tR:"Удаление, отсутствие, задержка, разделение, разрыв, рассеяние, для женщины — бегство возлюбленного.",r:"Mental alienation, error, loss, distraction, disorder, confusion.",rR:"Помрачение рассудка, ошибка, утрата, рассеянность, беспорядок, смятение."}]},
    { id:"four_of_swords", name:"Four of Swords", nameRu:"Четвёрка Мечей", n:"4",
      i:[{s:"Mathers",y:1888,t:"Solitude, retreat, abandonment, solitary, hermit.",tR:"Одиночество, уединение, покинутость, отшельник.",r:"Economy, precaution, regulation of expenditure.",rR:"Экономия, предосторожность, регулирование расходов."},{s:"Golden Dawn",y:1888,t:"Lord of Rest from Strife. Rest from sorrow, yet after and through it. Peace from and after war. Relaxation of anxiety.",tR:"Владыка Отдыха от Борьбы. Отдых от скорби, но после неё и через неё. Мир после войны. Ослабление тревоги."},{s:"Waite",y:1910,t:"Vigilance, retreat, solitude, hermit's repose, exile, tomb and coffin.",tR:"Бдительность, уединение, одиночество, покой отшельника, изгнание, гробница и гроб.",r:"Wise administration, circumspection, economy, avarice, precaution, testament.",rR:"Мудрое управление, осмотрительность, экономия, скупость, предосторожность, завещание."}]},
    { id:"five_of_swords", name:"Five of Swords", nameRu:"Пятёрка Мечей", n:"5",
      i:[{s:"Mathers",y:1888,t:"Mourning, sadness, affliction.",tR:"Траур, печаль, горе.",r:"Losses, trouble.",rR:"Потери, неприятности."},{s:"Golden Dawn",y:1888,t:"Lord of Defeat. Contest finished, and decided against the person, failure, defeat, anxiety, trouble, poverty.",tR:"Владыка Поражения. Состязание окончено и решено не в пользу человека, провал, поражение, тревога, неприятности, бедность."},{s:"Waite",y:1910,t:"Degradation, destruction, revocation, infamy, dishonor, loss. An attack on the fortune of the inquirer.",tR:"Деградация, разрушение, отмена, бесславие, бесчестие, потеря. Удар по благосостоянию вопрошающего.",r:"The same. Burial and obsequies. A sign of sorrow and mourning.",rR:"То же. Погребение и поминки. Знак скорби и траура."}]},
    { id:"six_of_swords", name:"Six of Swords", nameRu:"Шестёрка Мечей", n:"6",
      i:[{s:"Mathers",y:1888,t:"Envoy, messenger, voyage, travel.",tR:"Посланник, гонец, путешествие.",r:"Declaration, love proposed, revelation, surprise.",rR:"Признание, предложение любви, откровение, сюрприз."},{s:"Golden Dawn",y:1888,t:"Lord of Earned Success. Success after anxiety and trouble. Selfishness, beauty, conceit, but sometimes modesty therewith.",tR:"Владыка Заслуженного Успеха. Успех после тревоги и невзгод. Эгоизм, красота, тщеславие, но иногда и скромность."},{s:"Waite",y:1910,t:"Journey by water, route, way, envoy, commissionary, expedient, the voyage will be pleasant.",tR:"Путешествие по воде, маршрут, путь, посланник, уполномоченный, целесообразность, путешествие будет приятным.",r:"Declaration, confession, publicity. Unfavorable issue of a lawsuit.",rR:"Признание, исповедь, огласка. Неблагоприятный исход судебного дела."}]},
    { id:"seven_of_swords", name:"Seven of Swords", nameRu:"Семёрка Мечей", n:"7",
      i:[{s:"Mathers",y:1888,t:"Hope, confidence, desire, attempt, wish.",tR:"Надежда, уверенность, желание, попытка, стремление.",r:"Wise advice, good counsel, wisdom, prudence, circumspection.",rR:"Мудрый совет, добрый совет, мудрость, благоразумие, осмотрительность."},{s:"Golden Dawn",y:1888,t:"Lord of Unstable Effort. Partial success, yielding when victory is within grasp. Inclination to betray confidences.",tR:"Владыка Неустойчивого Усилия. Частичный успех, отступление, когда победа уже в руках. Склонность к разглашению доверенных тайн."},{s:"Waite",y:1910,t:"Design, attempt, wish, hope, confidence, quarreling, a plan that may fail, annoyance.",tR:"Замысел, попытка, желание, надежда, уверенность, ссоры, план, который может не удаться, раздражение.",r:"Good advice probably neglected, counsel, instruction, slander, babbling.",rR:"Хороший совет, вероятно проигнорированный, наставление, клевета, болтовня."}]},
    { id:"eight_of_swords", name:"Eight of Swords", nameRu:"Восьмёрка Мечей", n:"8",

    { id:"nine_of_swords", name:"Nine of Swords", nameRu:"Девятка Мечей", n:"9",

    { id:"ten_of_swords", name:"Ten of Swords", nameRu:"Десятка Мечей", n:"10",
      i:[{s:"Mathers",y:1888,t:"Tears, affliction, grief, sorrow.",tR:"Слёзы, скорбь, горе, печаль.",r:"Passing success, momentary advantage.",rR:"Мимолётный успех, кратковременное преимущество."},{s:"Golden Dawn",y:1888,t:"Lord of Ruin. Undisciplined warring force, complete disruption and failure. Ruin of all plans and projects.",tR:"Владыка Крушения. Неуправляемая воинственная сила, полное разрушение и крах. Крушение всех планов и замыслов."},{s:"Waite",y:1910,t:"Pain, affliction, tears, sadness, desolation. It is not especially a card of violent death.",tR:"Боль, скорбь, слёзы, печаль, опустошение. Не является в особенности картой насильственной смерти.",r:"Advantage, profit, success, favor, but none of these are permanent. Also power and authority.",rR:"Преимущество, выгода, успех, благосклонность, но ничто из этого не является постоянным. Также власть и авторитет."}]},
    { id:"page_of_swords", name:"Page of Swords", nameRu:"Паж Мечей", n:"Pg",

    { id:"knight_of_swords", name:"Knight of Swords", nameRu:"Рыцарь Мечей", n:"Kn",

    { id:"king_of_swords", name:"King of Swords", nameRu:"Король Мечей", n:"K",

  // ═══════════════ MINOR ARCANA — PENTACLES ═══════════════
  ...[

// HELPERS

function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function drawCards(deck,n) { return shuffle(deck).slice(0,n).map(c=>({...c,isReversed:Math.random()<0.5})); }
function getCardName(card,lang) { return lang==="ru" && card.nameRu ? card.nameRu : card.name; }
function getInterpText(interp,lang,isReversed) {
  if (isReversed) {
    const rev = lang==="ru" ? (interp.reversedRu||interp.reversed) : interp.reversed;
    if (rev) return rev;
  }
  return lang==="ru" ? (interp.textRu||interp.text) : interp.text;
}
function generateInterpretation(cards,lang) {
  return cards.map(({card,position,isReversed})=>{
    const waite=card.interpretations.find(i=>i.source==="Waite");
    const gd=card.interpretations.find(i=>i.source==="Golden Dawn");
    let text="";
    if(waite) text+=getInterpText(waite,lang,isReversed);
    if(gd) text+=" "+getInterpText(gd,lang,false);
    const n=getCardName(card,lang);
    const pos=isReversed?(lang==="ru"?"Перевёрнутая":"Reversed"):(lang==="ru"?"Прямая":"Upright");
    return `**${n}** (${position}, ${pos}): ${text}`;
  }).join("\n\n");
}

// SMART CARD RENDERER (Image + Fallback)
// ─────────────────────────────────────────────────────────
function CardPlaceholder({ card, isReversed, size = "normal", onClick }) {
  // This state tells the app if the image failed to load
  const [imgError, setImgError] = React.useState(false); 

  const suitColors = { wands: "#c44", cups: "#48a", swords: "#888", pentacles: "#b90" };
  const bg = card.type === "major" ? "#2a1f3d" : (suitColors[card.suit] || "#333");
  const w = size === "small" ? 90 : size === "large" ? 200 : 140;
  const h = Math.round(w * 1.56);

  // 1. IF NO ERROR YET: Try to draw the image
  if (!imgError) {
    return (
      <img
        src={`cards/${card.id}.jpg`} 
        alt={card.name}
        onClick={onClick}
        onError={() => setImgError(true)} // <-- THE FIX: If missing, switch to text layout
        style={{
          width: w, 
          height: h, 
          borderRadius: 6, 
          objectFit: "cover",
          cursor: onClick ? "pointer" : "default",
          border: "1px solid rgba(196,163,90,0.3)", 
          flexShrink: 0,
          transform: isReversed ? "rotate(180deg)" : "none",
          transition: "transform 0.6s ease, box-shadow 0.3s ease",
          boxShadow: "0 4px 20px rgba(0,0,0,0.4)",
        }}
      />
    );
  }

  // 2. IF IMAGE IS MISSING: Draw the original CSS text layout
  return (
    <div
      onClick={onClick}
      style={{
        width: w, height: h, borderRadius: 6, overflow: "hidden", cursor: onClick ? "pointer" : "default",
        border: "1px solid rgba(196,163,90,0.3)", position: "relative", flexShrink: 0,
        transform: isReversed ? "rotate(180deg)" : "none",
        transition: "transform 0.6s ease, box-shadow 0.3s ease",
        boxShadow: "0 4px 20px rgba(0,0,0,0.4)",
      }}
    >
      <div style={{
        width: "100%", height: "100%", background: `linear-gradient(135deg, ${bg}, ${bg}dd)`,
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        padding: 8, textAlign: "center", fontFamily: "'Playfair Display', serif",
      }}>
        <div style={{ fontSize: w > 140 ? 28 : 18, color: "#c4a35a", marginBottom: 4, fontWeight: 700 }}>
          {card.numeral}
        </div>
        <div style={{
          fontSize: w > 140 ? 13 : w > 100 ? 11 : 9, color: "#e8e4dc", lineHeight: 1.3,
          transform: isReversed ? "rotate(180deg)" : "none",
        }}>
          {card.name}
        </div>
        {card.suit && (
          <div style={{
            fontSize: w > 140 ? 10 : 8, color: "#9a9590", marginTop: 4, textTransform: "uppercase",
            letterSpacing: 2, transform: isReversed ? "rotate(180deg)" : "none",
          }}>
            {card.suit}
          </div>
        )}
      </div>
    </div>
  );
}

  return (
    <div style={{position:"fixed",inset:0,zIndex:1000,display:"flex",animation:"fadeIn 0.3s ease"}}>
      <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(4px)"}}/>
      <div style={{position:"relative",marginLeft:"auto",width:"min(720px,90vw)",height:"100vh",
        background:"#1a1816",borderLeft:"1px solid rgba(196,163,90,0.2)",overflowY:"auto",
        display:"flex",flexDirection:"column",animation:"slideIn 0.4s ease"}}>
        <button onClick={onClose} style={{position:"sticky",top:12,alignSelf:"flex-end",marginRight:16,marginTop:12,
          background:"none",border:"1px solid rgba(196,163,90,0.3)",color:"#c4a35a",
          padding:"6px 16px",cursor:"pointer",fontFamily:"'EB Garamond',serif",fontSize:14,borderRadius:3,zIndex:2}}>
          {t.close} ✕
        </button>
        <div style={{display:"flex",gap:32,padding:"20px 32px 32px",flexWrap:"wrap",alignItems:"flex-start"}}>
          <CardPlaceholder card={card} size="large" lang={lang}/>
          <div style={{flex:1,minWidth:260}}>
            <div style={{fontSize:11,color:"#c4a35a",textTransform:"uppercase",letterSpacing:3,marginBottom:6,fontFamily:"sans-serif"}}>
              {card.type==="major"?SUIT_LABELS[lang].major:SUIT_LABELS[lang][card.suit]}
            </div>
            <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:32,color:"#e8e4dc",margin:"0 0 4px",fontWeight:400}}>
              {card.numeral&&<span style={{color:"#c4a35a",marginRight:8}}>{card.numeral}</span>}
              {getCardName(card,lang)}
            </h2>
          </div>
        </div>
        <div style={{padding:"0 32px 48px"}}>
          <div style={{fontSize:12,color:"#c4a35a",textTransform:"uppercase",letterSpacing:3,
            marginBottom:20,fontFamily:"sans-serif",borderBottom:"1px solid rgba(196,163,90,0.15)",paddingBottom:10}}>
            {t.histInterp}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:0}}>
            {card.interpretations.map((interp,idx)=>(
              <div key={idx} style={{borderLeft:"2px solid rgba(196,163,90,0.2)",paddingLeft:20,paddingBottom:20,position:"relative"}}>
                <div style={{position:"absolute",left:-5,top:0,width:8,height:8,borderRadius:"50%",background:"#c4a35a"}}/>
                <div style={{fontFamily:"sans-serif",fontSize:11,color:"#c4a35a",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>
                  {interp.source} ({interp.year})
                </div>
                <div style={{fontFamily:"'EB Garamond',serif",fontSize:16,color:"#d4d0c8",lineHeight:1.65}}>
                  {lang==="ru"?(interp.textRu||interp.text):interp.text}
                </div>
                {(interp.reversed||interp.reversedRu)&&(
                  <div style={{fontFamily:"'EB Garamond',serif",fontSize:15,color:"#a08070",lineHeight:1.6,marginTop:6,fontStyle:"italic"}}>
                    <span style={{color:"#c4a35a",fontSize:11,fontFamily:"sans-serif",fontStyle:"normal",letterSpacing:1}}>
                      {lang==="ru"?"ПЕРЕВЁРНУТАЯ: ":"REVERSED: "}
                    </span>
                    {lang==="ru"?(interp.reversedRu||interp.reversed):interp.reversed}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
// CODEX VIEW
// ─────────────────────────────────────────────────────────
function CodexView({t,onSelectCard,lang}) {
  const [filter,setFilter]=useState("all");
  const [search,setSearch]=useState("");
  const filtered=useMemo(()=>{
    let cards=CARDS;
    if(filter==="major")cards=cards.filter(c=>c.type==="major");
    else if(filter!=="all")cards=cards.filter(c=>c.suit===filter);
    if(search){const s=search.toLowerCase();cards=cards.filter(c=>c.name.toLowerCase().includes(s)||(c.nameRu&&c.nameRu.toLowerCase().includes(s)));}
    return cards;
  },[filter,search]);
  const filters=[{key:"all",label:t.all},{key:"major",label:t.majorArcana},{key:"wands",label:t.wands},{key:"cups",label:t.cups},{key:"swords",label:t.swords},{key:"pentacles",label:t.pentacles}];
  return (
    <div style={{padding:"24px 0"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",marginBottom:24,padding:"0 24px"}}>
        {filters.map(f=>(
          <button key={f.key} onClick={()=>setFilter(f.key)} style={{
            background:filter===f.key?"rgba(196,163,90,0.15)":"transparent",
            border:`1px solid ${filter===f.key?"rgba(196,163,90,0.5)":"rgba(196,163,90,0.15)"}`,
            color:filter===f.key?"#c4a35a":"#9a9590",padding:"6px 16px",borderRadius:3,cursor:"pointer",
            fontFamily:"sans-serif",fontSize:11,textTransform:"uppercase",letterSpacing:1.5,transition:"all 0.2s ease"
          }}>{f.label}</button>
        ))}
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={t.search} style={{
          background:"rgba(255,255,255,0.04)",border:"1px solid rgba(196,163,90,0.15)",color:"#e8e4dc",
          padding:"7px 14px",borderRadius:3,marginLeft:"auto",fontFamily:"'EB Garamond',serif",fontSize:14,outline:"none",width:200
        }}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:16,padding:"0 24px"}}>
        {filtered.map(card=>(
          <div key={card.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,transition:"transform 0.2s ease"}}
            onMouseEnter={e=>e.currentTarget.style.transform="translateY(-4px)"}
            onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}>
            <CardPlaceholder card={card} onClick={()=>onSelectCard(card)} lang={lang}/>
            <div style={{fontFamily:"'EB Garamond',serif",fontSize:12,color:"#9a9590",textAlign:"center"}}>{getCardName(card,lang)}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
// BASIC READING
// ─────────────────────────────────────────────────────────
function BasicReading({t,onViewCard,lang}) {
  const [step,setStep]=useState("ask");
  const [mainCards,setMainCards]=useState([]);
  const [overlayCards,setOverlayCards]=useState([]);
  const [interpText,setInterpText]=useState("");
  const doReading=useCallback((mundane)=>{
    setStep("shuffling");
    setTimeout(()=>{
      const pool=mundane?CARDS.filter(c=>c.type==="minor"):CARDS;
      const drawn=drawCards(pool,3); setMainCards(drawn);
      let overlay=[];
      if(!mundane){const mp=CARDS.filter(c=>c.type==="major"&&!drawn.find(d=>d.id===c.id));overlay=drawCards(mp,3);setOverlayCards(overlay);}
      const pos=[t.past,t.present,t.future];
      const all=drawn.map((c,i)=>({card:c,position:pos[i],isReversed:c.isReversed}));
      if(overlay.length)overlay.forEach((c,i)=>all.push({card:c,position:`${t.higherInfluences} — ${pos[i]}`,isReversed:c.isReversed}));
      setInterpText(generateInterpretation(all,lang)); setStep("reveal");
    },1800);
  },[t,lang]);
  const reset=()=>{setStep("ask");setMainCards([]);setOverlayCards([]);setInterpText("");};
  if(step==="ask")return(
    <div style={{textAlign:"center",padding:"80px 24px"}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,color:"#e8e4dc",marginBottom:12}}>{t.basicReading}</div>
      <div style={{fontFamily:"'EB Garamond',serif",fontSize:16,color:"#9a9590",marginBottom:40}}>{t.basicDesc}</div>
      <div style={{fontFamily:"'EB Garamond',serif",fontSize:18,color:"#d4d0c8",marginBottom:24}}>{t.mundaneQ}</div>
      <div style={{display:"flex",gap:16,justifyContent:"center"}}>
        {[{l:t.yes,v:true},{l:t.no,v:false}].map(b=>(
          <button key={b.l} onClick={()=>doReading(b.v)} style={{background:"rgba(196,163,90,0.1)",border:"1px solid rgba(196,163,90,0.3)",
            color:"#c4a35a",padding:"10px 32px",borderRadius:3,cursor:"pointer",fontFamily:"'EB Garamond',serif",fontSize:16}}>{b.l}</button>
        ))}
      </div>
    </div>
  );
  if(step==="shuffling")return(<div style={{textAlign:"center",padding:"120px 24px"}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"#c4a35a",animation:"pulse 1.5s ease-in-out infinite"}}>{t.shuffling}</div></div>);
  const positions=[t.past,t.present,t.future];
  return(
    <div style={{padding:"40px 24px",maxWidth:800,margin:"0 auto"}}>
      <div style={{textAlign:"center",marginBottom:32}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:"#e8e4dc"}}>{t.basicReading}</div></div>
      {overlayCards.length>0&&(<div style={{marginBottom:12}}>
        <div style={{fontFamily:"sans-serif",fontSize:10,color:"#c4a35a",textTransform:"uppercase",letterSpacing:2,textAlign:"center",marginBottom:12}}>{t.higherInfluences}</div>
        <div style={{display:"flex",justifyContent:"center",gap:40}}>
          {overlayCards.map(card=>(<div key={card.id} style={{textAlign:"center"}}><CardPlaceholder card={card} isReversed={card.isReversed} size="small" onClick={()=>onViewCard(card)} lang={lang}/><div style={{fontSize:10,color:"#9a9590",marginTop:6,fontFamily:"sans-serif"}}>{card.isReversed?"↕ ":""}{getCardName(card,lang)}</div></div>))}
        </div>
      </div>)}
      <div style={{display:"flex",justifyContent:"center",gap:40,marginBottom:48,borderTop:overlayCards.length?"1px solid rgba(196,163,90,0.1)":"none",paddingTop:overlayCards.length?20:0}}>
        {mainCards.map((card,i)=>(<div key={card.id} style={{textAlign:"center"}}>
          <div style={{fontFamily:"sans-serif",fontSize:10,color:"#c4a35a",textTransform:"uppercase",letterSpacing:2,marginBottom:10}}>{positions[i]}</div>
          <CardPlaceholder card={card} isReversed={card.isReversed} onClick={()=>onViewCard(card)} lang={lang}/>
          <div style={{fontSize:12,color:"#e8e4dc",marginTop:8,fontFamily:"'EB Garamond',serif"}}>{getCardName(card,lang)}</div>
          <div style={{fontSize:10,color:card.isReversed?"#a06050":"#7a9a6a",fontFamily:"sans-serif"}}>{card.isReversed?t.reversed:t.upright}</div>
        </div>))}
      </div>
      <div style={{background:"rgba(196,163,90,0.04)",border:"1px solid rgba(196,163,90,0.1)",borderRadius:4,padding:28}}>
        <div style={{fontFamily:"sans-serif",fontSize:11,color:"#c4a35a",textTransform:"uppercase",letterSpacing:2,marginBottom:16}}>{t.interpretation}</div>
        <div style={{fontFamily:"'EB Garamond',serif",fontSize:16,color:"#d4d0c8",lineHeight:1.7}}>
          {interpText.split("\n\n").map((p,i)=>{const parts=p.split("**");return(<p key={i} style={{marginBottom:12}}>{parts.map((part,j)=>j%2===1?<strong key={j} style={{color:"#c4a35a"}}>{part}</strong>:part)}</p>);})}
        </div>
      </div>
      <div style={{textAlign:"center",marginTop:32}}><button onClick={reset} style={{background:"rgba(196,163,90,0.1)",border:"1px solid rgba(196,163,90,0.3)",color:"#c4a35a",padding:"10px 28px",borderRadius:3,cursor:"pointer",fontFamily:"'EB Garamond',serif",fontSize:15}}>{t.newReading}</button></div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
// ADVANCED READING
// ─────────────────────────────────────────────────────────
function AdvancedReading({t,onViewCard,lang}) {
  const [step,setStep]=useState("ask");
  const [sigCard,setSigCard]=useState(null);
  const [hexCards,setHexCards]=useState([]);
  const [interpText,setInterpText]=useState("");
  const doReading=useCallback((mundane)=>{
    setStep("shuffling");
    setTimeout(()=>{
      const pool=mundane?CARDS.filter(c=>c.type==="minor"):CARDS;
      const drawn=drawCards(pool,7);const sig=drawn[0];const hex=drawn.slice(1);
      setSigCard(sig);setHexCards(hex);
      const pl=[t.top,t.topRight,t.bottomRight,t.bottom,t.bottomLeft,t.topLeft];
      const all=[{card:sig,position:t.significator,isReversed:sig.isReversed},...hex.map((c,i)=>({card:c,position:pl[i],isReversed:c.isReversed}))];
      setInterpText(generateInterpretation(all,lang));setStep("reveal");
    },2200);
  },[t,lang]);
  const reset=()=>{setStep("ask");setSigCard(null);setHexCards([]);setInterpText("");};
  if(step==="ask")return(
    <div style={{textAlign:"center",padding:"80px 24px"}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,color:"#e8e4dc",marginBottom:12}}>{t.advancedReading}</div>
      <div style={{fontFamily:"'EB Garamond',serif",fontSize:16,color:"#9a9590",marginBottom:40}}>{t.advancedDesc}</div>
      <div style={{fontFamily:"'EB Garamond',serif",fontSize:18,color:"#d4d0c8",marginBottom:24}}>{t.mundaneQ}</div>
      <div style={{display:"flex",gap:16,justifyContent:"center"}}>
        {[{l:t.yes,v:true},{l:t.no,v:false}].map(b=>(<button key={b.l} onClick={()=>doReading(b.v)} style={{background:"rgba(196,163,90,0.1)",border:"1px solid rgba(196,163,90,0.3)",color:"#c4a35a",padding:"10px 32px",borderRadius:3,cursor:"pointer",fontFamily:"'EB Garamond',serif",fontSize:16}}>{b.l}</button>))}
      </div>
    </div>
  );
  if(step==="shuffling")return(<div style={{textAlign:"center",padding:"120px 24px"}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"#c4a35a",animation:"pulse 1.5s ease-in-out infinite"}}>{t.shuffling}</div></div>);
  const posLabels=[t.top,t.topRight,t.bottomRight,t.bottom,t.bottomLeft,t.topLeft];
  const hexPositions=[{x:50,y:2},{x:85,y:26},{x:85,y:72},{x:50,y:96},{x:15,y:72},{x:15,y:26}];
  return(
    <div style={{padding:"40px 24px",maxWidth:800,margin:"0 auto"}}>
      <div style={{textAlign:"center",marginBottom:24}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:"#e8e4dc"}}>{t.advancedReading}</div></div>
      <div style={{display:"flex",gap:16,justifyContent:"center",marginBottom:16,fontSize:11,fontFamily:"sans-serif"}}>
        <span style={{color:"#7a9a6a"}}>▲ {t.favorable}: {t.topLeft}, {t.top}, {t.topRight}</span>
        <span style={{color:"#a06050"}}>▼ {t.opposing}: {t.bottomLeft}, {t.bottom}, {t.bottomRight}</span>
      </div>
      <div style={{position:"relative",width:"100%",maxWidth:520,margin:"0 auto 40px",aspectRatio:"1/1"}}>
        <div style={{position:"absolute",left:"50%",top:"50%",transform:"translate(-50%,-50%)",textAlign:"center",zIndex:2}}>
          <div style={{fontSize:10,color:"#c4a35a",textTransform:"uppercase",letterSpacing:2,marginBottom:6,fontFamily:"sans-serif"}}>{t.significator}</div>
          {sigCard&&<CardPlaceholder card={sigCard} isReversed={sigCard.isReversed} size="small" onClick={()=>onViewCard(sigCard)} lang={lang}/>}
          {sigCard&&<div style={{fontSize:10,color:"#9a9590",marginTop:4}}>{getCardName(sigCard,lang)}</div>}
        </div>
        {hexCards.map((card,i)=>{const pos=hexPositions[i];const isFav=[0,1,5].includes(i);return(
          <div key={card.id} style={{position:"absolute",left:`${pos.x}%`,top:`${pos.y}%`,transform:"translate(-50%,-50%)",textAlign:"center"}}>
            <div style={{fontSize:9,color:isFav?"#7a9a6a":"#a06050",textTransform:"uppercase",letterSpacing:1.5,marginBottom:4,fontFamily:"sans-serif"}}>{posLabels[i]}</div>
            <CardPlaceholder card={card} isReversed={card.isReversed} size="small" onClick={()=>onViewCard(card)} lang={lang}/>
            <div style={{fontSize:9,color:"#9a9590",marginTop:3,maxWidth:90}}>{getCardName(card,lang)}</div>
            <div style={{fontSize:8,color:card.isReversed?"#a06050":"#7a9a6a"}}>{card.isReversed?t.reversed:t.upright}</div>
          </div>
        );})}
      </div>
      <div style={{background:"rgba(196,163,90,0.04)",border:"1px solid rgba(196,163,90,0.1)",borderRadius:4,padding:28}}>
        <div style={{fontFamily:"sans-serif",fontSize:11,color:"#c4a35a",textTransform:"uppercase",letterSpacing:2,marginBottom:16}}>{t.interpretation}</div>
        <div style={{fontFamily:"'EB Garamond',serif",fontSize:16,color:"#d4d0c8",lineHeight:1.7}}>
          {interpText.split("\n\n").map((p,i)=>{const parts=p.split("**");return(<p key={i} style={{marginBottom:12}}>{parts.map((part,j)=>j%2===1?<strong key={j} style={{color:"#c4a35a"}}>{part}</strong>:part)}</p>);})}
        </div>
      </div>
      <div style={{textAlign:"center",marginTop:32}}><button onClick={reset} style={{background:"rgba(196,163,90,0.1)",border:"1px solid rgba(196,163,90,0.3)",color:"#c4a35a",padding:"10px 28px",borderRadius:3,cursor:"pointer",fontFamily:"'EB Garamond',serif",fontSize:15}}>{t.newReading}</button></div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
// READING VIEW
// ─────────────────────────────────────────────────────────
function ReadingView({t,onViewCard,lang}) {
  const [mode,setMode]=useState(null);
  if(!mode)return(
    <div style={{textAlign:"center",padding:"80px 24px"}}>
      <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,color:"#e8e4dc",marginBottom:8}}>{t.reading}</div>
      <div style={{fontFamily:"'EB Garamond',serif",fontSize:16,color:"#9a9590",marginBottom:48}}>{t.askQuestion}</div>
      <div style={{display:"flex",gap:24,justifyContent:"center",flexWrap:"wrap"}}>
        {[{key:"basic",label:t.basicReading,desc:t.basicDesc},{key:"advanced",label:t.advancedReading,desc:t.advancedDesc}].map(m=>(
          <button key={m.key} onClick={()=>setMode(m.key)} style={{background:"rgba(196,163,90,0.05)",border:"1px solid rgba(196,163,90,0.2)",
            borderRadius:4,padding:"28px 36px",cursor:"pointer",textAlign:"center",maxWidth:280,transition:"all 0.2s ease"}}
            onMouseEnter={e=>{e.currentTarget.style.background="rgba(196,163,90,0.1)";e.currentTarget.style.borderColor="rgba(196,163,90,0.4)";}}
            onMouseLeave={e=>{e.currentTarget.style.background="rgba(196,163,90,0.05)";e.currentTarget.style.borderColor="rgba(196,163,90,0.2)";}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,color:"#c4a35a",marginBottom:8}}>{m.label}</div>
            <div style={{fontFamily:"'EB Garamond',serif",fontSize:14,color:"#9a9590"}}>{m.desc}</div>
          </button>
        ))}
      </div>
    </div>
  );
  return mode==="basic"?<BasicReading t={t} onViewCard={onViewCard} lang={lang}/>:<AdvancedReading t={t} onViewCard={onViewCard} lang={lang}/>;
}

// ─────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────
function App() {
  const [lang,setLang]=useState("en");
  const [view,setView]=useState("codex");
  const [selectedCard,setSelectedCard]=useState(null);
  const t=T[lang];
  return(
    <div style={{minHeight:"100vh",background:"#12100e",color:"#e8e4dc",fontFamily:"'EB Garamond',serif"}}>
      <header style={{borderBottom:"1px solid rgba(196,163,90,0.12)",padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:"rgba(18,16,14,0.95)",backdropFilter:"blur(8px)",zIndex:100}}>
        <div>
          <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:400,color:"#c4a35a",letterSpacing:1}}>{t.title}</h1>
          <div style={{fontFamily:"sans-serif",fontSize:9,color:"#6a6560",textTransform:"uppercase",letterSpacing:3,marginTop:2}}>{t.subtitle}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <nav style={{display:"flex",gap:4}}>
            {[{key:"codex",label:t.codex},{key:"reading",label:t.reading}].map(v=>(
              <button key={v.key} onClick={()=>setView(v.key)} style={{background:view===v.key?"rgba(196,163,90,0.12)":"transparent",border:"none",color:view===v.key?"#c4a35a":"#9a9590",padding:"6px 16px",borderRadius:3,cursor:"pointer",fontFamily:"'EB Garamond',serif",fontSize:15,transition:"all 0.2s ease"}}>{v.label}</button>
            ))}
          </nav>
          <button onClick={()=>setLang(l=>l==="en"?"ru":"en")} style={{background:"none",border:"1px solid rgba(196,163,90,0.2)",color:"#9a9590",padding:"4px 10px",borderRadius:3,cursor:"pointer",fontFamily:"sans-serif",fontSize:10,textTransform:"uppercase",letterSpacing:1}}>{lang==="en"?"RU":"EN"}</button>
        </div>
      </header>
      {view==="codex"?<CodexView t={t} onSelectCard={setSelectedCard} lang={lang}/>:<ReadingView t={t} onViewCard={setSelectedCard} lang={lang}/>}
      <CardDetail card={selectedCard} onClose={()=>setSelectedCard(null)} t={t} lang={lang}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
