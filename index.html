function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function drawCards(deck, n) {
  const shuffled = shuffle(deck);
  return shuffled.slice(0, n).map(card => ({
    ...card,
    isReversed: Math.random() < 0.5
  }));
}

function generateInterpretation(cards, lang) {
  return cards.map(({ card, position, isReversed }) => {
    const waite = card.interpretations.find(i => i.source === "Waite");
    const gd = card.interpretations.find(i => i.source === "Golden Dawn");
    let text = "";
    if (waite) {
      text += isReversed && waite.reversed ? waite.reversed : waite.text;
    }
    if (gd) {
      text += " " + gd.text;
    }
    return `**${card.name}** (${position}, ${isReversed ? "Reversed" : "Upright"}): ${text}`;
  }).join("\n\n");
}

function CardPlaceholder({ card, isReversed, size = "normal", onClick }) {
  // This state tells the app if the image failed to load
  const [imgError, setImgError] = React.useState(false); 

  const suitColors = { wands: "#c44", cups: "#48a", swords: "#888", pentacles: "#b90" };
  const bg = card.type === "major" ? "#2a1f3d" : (suitColors[card.suit] || "#333");
  const w = size === "small" ? 90 : size === "large" ? 200 : 140;
  const h = Math.round(w * 1.56);

  // 1. IF NO ERROR YET: Try to draw the image
  if (!imgError) {
    return (
      <img
        src={`cards/${card.id}.jpg`} 
        alt={card.name}
        onClick={onClick}
        onError={() => setImgError(true)} // <-- THE FIX: If missing, switch to text layout
        style={{
          width: w, 
          height: h, 
          borderRadius: 6, 
          objectFit: "cover",
          cursor: onClick ? "pointer" : "default",
          border: "1px solid rgba(196,163,90,0.3)", 
          flexShrink: 0,
          transform: isReversed ? "rotate(180deg)" : "none",
          transition: "transform 0.6s ease, box-shadow 0.3s ease",
          boxShadow: "0 4px 20px rgba(0,0,0,0.4)",
        }}
      />
    );
  }

  // 2. IF IMAGE IS MISSING: Draw the original CSS text layout
  return (
    <div
      onClick={onClick}
      style={{
        width: w, height: h, borderRadius: 6, overflow: "hidden", cursor: onClick ? "pointer" : "default",
        border: "1px solid rgba(196,163,90,0.3)", position: "relative", flexShrink: 0,
        transform: isReversed ? "rotate(180deg)" : "none",
        transition: "transform 0.6s ease, box-shadow 0.3s ease",
        boxShadow: "0 4px 20px rgba(0,0,0,0.4)",
      }}
    >
      <div style={{
        width: "100%", height: "100%", background: `linear-gradient(135deg, ${bg}, ${bg}dd)`,
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        padding: 8, textAlign: "center", fontFamily: "'Playfair Display', serif",
      }}>
        <div style={{ fontSize: w > 140 ? 28 : 18, color: "#c4a35a", marginBottom: 4, fontWeight: 700 }}>
          {card.numeral}
        </div>
        <div style={{
          fontSize: w > 140 ? 13 : w > 100 ? 11 : 9, color: "#e8e4dc", lineHeight: 1.3,
          transform: isReversed ? "rotate(180deg)" : "none",
        }}>
          {card.name}
        </div>
        {card.suit && (
          <div style={{
            fontSize: w > 140 ? 10 : 8, color: "#9a9590", marginTop: 4, textTransform: "uppercase",
            letterSpacing: 2, transform: isReversed ? "rotate(180deg)" : "none",
          }}>
            {card.suit}
          </div>
        )}
      </div>
    </div>
  );
}

function CodexView({ t, onSelectCard }) {
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");

  const filtered = useMemo(() => {
    let cards = CARDS;
    if (filter === "major") cards = cards.filter(c => c.type === "major");
    else if (filter !== "all") cards = cards.filter(c => c.suit === filter);
    if (search) cards = cards.filter(c => c.name.toLowerCase().includes(search.toLowerCase()));
    return cards;
  }, [filter, search]);

  const filters = [
    { key: "all", label: t.all },
    { key: "major", label: t.majorArcana },
    { key: "wands", label: t.wands },
    { key: "cups", label: t.cups },
    { key: "swords", label: t.swords },
    { key: "pentacles", label: t.pentacles },
  ];

  return (
    <div style={{ padding: "24px 0" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap", marginBottom: 24, padding: "0 24px" }}>
        {filters.map(f => (
          <button key={f.key} onClick={() => setFilter(f.key)} style={{
            background: filter === f.key ? "rgba(196,163,90,0.15)" : "transparent",
            border: `1px solid ${filter === f.key ? "rgba(196,163,90,0.5)" : "rgba(196,163,90,0.15)"}`,
            color: filter === f.key ? "#c4a35a" : "#9a9590",
            padding: "6px 16px", borderRadius: 3, cursor: "pointer",
            fontFamily: "sans-serif", fontSize: 11, textTransform: "uppercase", letterSpacing: 1.5,
            transition: "all 0.2s ease",
          }}>
            {f.label}
          </button>
        ))}
        <input
          value={search} onChange={e => setSearch(e.target.value)}
          placeholder={t.search}
          style={{
            background: "rgba(255,255,255,0.04)", border: "1px solid rgba(196,163,90,0.15)",
            color: "#e8e4dc", padding: "7px 14px", borderRadius: 3, marginLeft: "auto",
            fontFamily: "'EB Garamond', serif", fontSize: 14, outline: "none", width: 200,
          }}
        />
      </div>
      <div style={{
        display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))",
        gap: 16, padding: "0 24px",
      }}>
        {filtered.map(card => (
          <div key={card.id} style={{
            display: "flex", flexDirection: "column", alignItems: "center", gap: 8,
            transition: "transform 0.2s ease",
          }}
            onMouseEnter={e => e.currentTarget.style.transform = "translateY(-4px)"}
            onMouseLeave={e => e.currentTarget.style.transform = "translateY(0)"}
          >
            <CardPlaceholder card={card} onClick={() => onSelectCard(card)} />
            <div style={{
              fontFamily: "'EB Garamond', serif", fontSize: 12, color: "#9a9590", textAlign: "center",
            }}>
              {card.name}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

  const [mainCards, setMainCards] = useState([]);
  const [overlayCards, setOverlayCards] = useState([]);
  const [interpText, setInterpText] = useState("");

  const doReading = useCallback((mundane) => {
    setIsMundane(mundane);
    setStep("shuffling");
    setTimeout(() => {
      const pool = mundane ? CARDS.filter(c => c.type === "minor") : CARDS;
      const drawn = drawCards(pool, 3);
      setMainCards(drawn);
      let overlay = [];
      if (!mundane) {
        const majorPool = CARDS.filter(c => c.type === "major" && !drawn.find(d => d.id === c.id));
        overlay = drawCards(majorPool, 3);
        setOverlayCards(overlay);
      }
      const positions = [t.past, t.present, t.future];
      const allForInterp = drawn.map((c, i) => ({
        card: c, position: positions[i], isReversed: c.isReversed
      }));
      if (overlay.length) {
        overlay.forEach((c, i) => {
          allForInterp.push({ card: c, position: `${t.higherInfluences} — ${positions[i]}`, isReversed: c.isReversed });
        });
      }
      setInterpText(generateInterpretation(allForInterp));
      setStep("reveal");
    }, 1800);
  }, [t]);

  const reset = () => {
    setStep("ask"); setMainCards([]); setOverlayCards([]); setInterpText(""); setIsMundane(null);
  };

  if (step === "ask") {
    return (
      <div style={{ textAlign: "center", padding: "80px 24px" }}>
        <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 28, color: "#e8e4dc", marginBottom: 12 }}>
          {t.basicReading}
        </div>
        <div style={{ fontFamily: "'EB Garamond', serif", fontSize: 16, color: "#9a9590", marginBottom: 40 }}>
          {t.basicDesc}
        </div>
        <div style={{ fontFamily: "'EB Garamond', serif", fontSize: 18, color: "#d4d0c8", marginBottom: 24 }}>
          {t.mundaneQ}
        </div>
        <div style={{ display: "flex", gap: 16, justifyContent: "center" }}>
          {[{ label: t.yes, val: true }, { label: t.no, val: false }].map(b => (
            <button key={b.label} onClick={() => doReading(b.val)} style={{
              background: "rgba(196,163,90,0.1)", border: "1px solid rgba(196,163,90,0.3)",
              color: "#c4a35a", padding: "10px 32px", borderRadius: 3, cursor: "pointer",
              fontFamily: "'EB Garamond', serif", fontSize: 16,
              transition: "all 0.2s ease",
            }}
              onMouseEnter={e => e.currentTarget.style.background = "rgba(196,163,90,0.2)"}
              onMouseLeave={e => e.currentTarget.style.background = "rgba(196,163,90,0.1)"}
            >
              {b.label}
            </button>
          ))}
        </div>
      </div>
    );
  }

  if (step === "shuffling") {
    return (
      <div style={{ textAlign: "center", padding: "120px 24px" }}>
        <div style={{
          fontFamily: "'Playfair Display', serif", fontSize: 22, color: "#c4a35a",
          animation: "pulse 1.5s ease-in-out infinite",
        }}>
          {t.shuffling}
        </div>
      </div>
    );
  }

  const positions = [t.past, t.present, t.future];

  return (
    <div style={{ padding: "40px 24px", maxWidth: 800, margin: "0 auto" }}>
      <div style={{ textAlign: "center", marginBottom: 32 }}>
        <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 24, color: "#e8e4dc" }}>
          {t.basicReading}
        </div>
      </div>
      {overlayCards.length > 0 && (
        <div style={{ marginBottom: 12 }}>
          <div style={{
            fontFamily: "sans-serif", fontSize: 10, color: "#c4a35a", textTransform: "uppercase",
            letterSpacing: 2, textAlign: "center", marginBottom: 12,
          }}>
            {t.higherInfluences}
          </div>
          <div style={{ display: "flex", justifyContent: "center", gap: 40 }}>
            {overlayCards.map((card, i) => (
              <div key={card.id} style={{ textAlign: "center" }}>
                <CardPlaceholder card={card} isReversed={card.isReversed} size="small" onClick={() => onViewCard(card)} />
                <div style={{ fontSize: 10, color: "#9a9590", marginTop: 6, fontFamily: "sans-serif" }}>
                  {card.isReversed ? "↕ " : ""}{card.name}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
      <div style={{
        display: "flex", justifyContent: "center", gap: 40, marginBottom: 48,
        borderTop: overlayCards.length ? "1px solid rgba(196,163,90,0.1)" : "none",
        paddingTop: overlayCards.length ? 20 : 0,
      }}>
        {mainCards.map((card, i) => (
          <div key={card.id} style={{ textAlign: "center" }}>
            <div style={{
              fontFamily: "sans-serif", fontSize: 10, color: "#c4a35a", textTransform: "uppercase",
              letterSpacing: 2, marginBottom: 10,
            }}>
              {positions[i]}
            </div>
            <CardPlaceholder card={card} isReversed={card.isReversed} onClick={() => onViewCard(card)} />
            <div style={{ fontSize: 12, color: "#e8e4dc", marginTop: 8, fontFamily: "'EB Garamond', serif" }}>
              {card.name}
            </div>
            <div style={{ fontSize: 10, color: card.isReversed ? "#a06050" : "#7a9a6a", fontFamily: "sans-serif" }}>
              {card.isReversed ? t.reversed : t.upright}
            </div>
          </div>
        ))}
      </div>
      <div style={{
        background: "rgba(196,163,90,0.04)", border: "1px solid rgba(196,163,90,0.1)",
        borderRadius: 4, padding: 28,
      }}>
        <div style={{
          fontFamily: "sans-serif", fontSize: 11, color: "#c4a35a", textTransform: "uppercase",
          letterSpacing: 2, marginBottom: 16,
        }}>
          {t.interpretation}
        </div>
        <div style={{ fontFamily: "'EB Garamond', serif", fontSize: 16, color: "#d4d0c8", lineHeight: 1.7 }}>
          {interpText.split("\n\n").map((p, i) => {
            const parts = p.split("**");
            return (
              <p key={i} style={{ marginBottom: 12 }}>
                {parts.map((part, j) => j % 2 === 1 ? <strong key={j} style={{ color: "#c4a35a" }}>{part}</strong> : part)}
              </p>
            );
          })}
        </div>
      </div>
      <div style={{ textAlign: "center", marginTop: 32 }}>
        <button onClick={reset} style={{
          background: "rgba(196,163,90,0.1)", border: "1px solid rgba(196,163,90,0.3)",
          color: "#c4a35a", padding: "10px 28px", borderRadius: 3, cursor: "pointer",
          fontFamily: "'EB Garamond', serif", fontSize: 15,
        }}>
          {t.newReading}
        </button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
// ADVANCED READING VIEW (Hexagram)
// ─────────────────────────────────────────────────────────
function AdvancedReading({ t, onViewCard }) {
  const [step, setStep] = useState("ask");
  const [isMundane, setIsMundane] = useState(null);
  const [sigCard, setSigCard] = useState(null);
  const [hexCards, setHexCards] = useState([]);
  const [interpText, setInterpText] = useState("");

  const doReading = useCallback((mundane) => {
    setIsMundane(mundane);
    setStep("shuffling");
    setTimeout(() => {
      const pool = mundane ? CARDS.filter(c => c.type === "minor") : CARDS;
      const drawn = drawCards(pool, 7);
      const sig = drawn[0];
      const hex = drawn.slice(1);
      setSigCard(sig);
      setHexCards(hex);
      const posLabels = [t.top, t.topRight, t.bottomRight, t.bottom, t.bottomLeft, t.topLeft];
      const allForInterp = [
        { card: sig, position: t.significator, isReversed: sig.isReversed },
        ...hex.map((c, i) => ({ card: c, position: posLabels[i], isReversed: c.isReversed })),
      ];
      setInterpText(generateInterpretation(allForInterp));
      setStep("reveal");
    }, 2200);
  }, [t]);

  const reset = () => {
    setStep("ask"); setSigCard(null); setHexCards([]); setInterpText(""); setIsMundane(null);
  };

  if (step === "ask") {
    return (
      <div style={{ textAlign: "center", padding: "80px 24px" }}>
        <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 28, color: "#e8e4dc", marginBottom: 12 }}>
          {t.advancedReading}
        </div>
        <div style={{ fontFamily: "'EB Garamond', serif", fontSize: 16, color: "#9a9590", marginBottom: 40 }}>
          {t.advancedDesc}
        </div>
        <div style={{ fontFamily: "'EB Garamond', serif", fontSize: 18, color: "#d4d0c8", marginBottom: 24 }}>
          {t.mundaneQ}
        </div>
        <div style={{ display: "flex", gap: 16, justifyContent: "center" }}>
          {[{ label: t.yes, val: true }, { label: t.no, val: false }].map(b => (
            <button key={b.label} onClick={() => doReading(b.val)} style={{
              background: "rgba(196,163,90,0.1)", border: "1px solid rgba(196,163,90,0.3)",
              color: "#c4a35a", padding: "10px 32px", borderRadius: 3, cursor: "pointer",
              fontFamily: "'EB Garamond', serif", fontSize: 16,
            }}>
              {b.label}
            </button>
          ))}
        </div>
      </div>
    );
  }

  if (step === "shuffling") {
    return (
      <div style={{ textAlign: "center", padding: "120px 24px" }}>
        <div style={{
          fontFamily: "'Playfair Display', serif", fontSize: 22, color: "#c4a35a",
          animation: "pulse 1.5s ease-in-out infinite",
        }}>
          {t.shuffling}
        </div>
      </div>
    );
  }

  const posLabels = [t.top, t.topRight, t.bottomRight, t.bottom, t.bottomLeft, t.topLeft];
  // positions: 0=top, 1=top-right, 2=bottom-right, 3=bottom, 4=bottom-left, 5=top-left
  // Ascending triangle (favorable): 5(TL), 0(T), 1(TR)
  // Descending triangle (opposing): 4(BL), 3(B), 2(BR)
  const hexPositions = [
    { x: 50, y: 2 },   // 0: top
    { x: 85, y: 26 },  // 1: top-right
    { x: 85, y: 72 },  // 2: bottom-right
    { x: 50, y: 96 },  // 3: bottom
    { x: 15, y: 72 },  // 4: bottom-left
    { x: 15, y: 26 },  // 5: top-left
  ];

  return (
    <div style={{ padding: "40px 24px", maxWidth: 800, margin: "0 auto" }}>
      <div style={{ textAlign: "center", marginBottom: 24 }}>
        <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 24, color: "#e8e4dc" }}>
          {t.advancedReading}
        </div>
      </div>
      <div style={{ display: "flex", gap: 16, justifyContent: "center", marginBottom: 16, fontSize: 11, fontFamily: "sans-serif" }}>
        <span style={{ color: "#7a9a6a" }}>▲ {t.favorable}: {t.topLeft}, {t.top}, {t.topRight}</span>
        <span style={{ color: "#a06050" }}>▼ {t.opposing}: {t.bottomLeft}, {t.bottom}, {t.bottomRight}</span>
      </div>
      <div style={{ position: "relative", width: "100%", maxWidth: 520, margin: "0 auto 40px", aspectRatio: "1 / 1" }}>
        {/* Center - Significator */}
        <div style={{
          position: "absolute", left: "50%", top: "50%", transform: "translate(-50%, -50%)",
          textAlign: "center", zIndex: 2,
        }}>
          <div style={{ fontSize: 10, color: "#c4a35a", textTransform: "uppercase", letterSpacing: 2, marginBottom: 6, fontFamily: "sans-serif" }}>
            {t.significator}
          </div>
          {sigCard && <CardPlaceholder card={sigCard} isReversed={sigCard.isReversed} size="small" onClick={() => onViewCard(sigCard)} />}
          {sigCard && <div style={{ fontSize: 10, color: "#9a9590", marginTop: 4 }}>{sigCard.name}</div>}
        </div>
        {/* Hex positions */}
        {hexCards.map((card, i) => {
          const pos = hexPositions[i];
          const isFav = [0, 1, 5].includes(i);
          return (
            <div key={card.id} style={{
              position: "absolute", left: `${pos.x}%`, top: `${pos.y}%`,
              transform: "translate(-50%, -50%)", textAlign: "center",
            }}>
              <div style={{
                fontSize: 9, color: isFav ? "#7a9a6a" : "#a06050",
                textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 4, fontFamily: "sans-serif",
              }}>
                {posLabels[i]}
              </div>
              <CardPlaceholder card={card} isReversed={card.isReversed} size="small" onClick={() => onViewCard(card)} />
              <div style={{ fontSize: 9, color: "#9a9590", marginTop: 3, maxWidth: 90 }}>{card.name}</div>
              <div style={{ fontSize: 8, color: card.isReversed ? "#a06050" : "#7a9a6a" }}>
                {card.isReversed ? "Reversed" : "Upright"}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{
        background: "rgba(196,163,90,0.04)", border: "1px solid rgba(196,163,90,0.1)",
        borderRadius: 4, padding: 28,
      }}>
        <div style={{
          fontFamily: "sans-serif", fontSize: 11, color: "#c4a35a", textTransform: "uppercase",
          letterSpacing: 2, marginBottom: 16,
        }}>
          {t.interpretation}
        </div>
        <div style={{ fontFamily: "'EB Garamond', serif", fontSize: 16, color: "#d4d0c8", lineHeight: 1.7 }}>
          {interpText.split("\n\n").map((p, i) => {
            const parts = p.split("**");
            return (
              <p key={i} style={{ marginBottom: 12 }}>
                {parts.map((part, j) => j % 2 === 1 ? <strong key={j} style={{ color: "#c4a35a" }}>{part}</strong> : part)}
              </p>
            );
          })}
        </div>
      </div>
      <div style={{ textAlign: "center", marginTop: 32 }}>
        <button onClick={reset} style={{
          background: "rgba(196,163,90,0.1)", border: "1px solid rgba(196,163,90,0.3)",
          color: "#c4a35a", padding: "10px 28px", borderRadius: 3, cursor: "pointer",
          fontFamily: "'EB Garamond', serif", fontSize: 15,
        }}>
          {t.newReading}
        </button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────
// READING VIEW (Mode Selector)
// ─────────────────────────────────────────────────────────
function ReadingView({ t, onViewCard }) {
  const [mode, setMode] = useState(null);

  if (!mode) {
    return (
      <div style={{ textAlign: "center", padding: "80px 24px" }}>
        <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 28, color: "#e8e4dc", marginBottom: 8 }}>
          {t.reading}
        </div>
        <div style={{ fontFamily: "'EB Garamond', serif", fontSize: 16, color: "#9a9590", marginBottom: 48 }}>
          {t.askQuestion}
        </div>
        <div style={{ display: "flex", gap: 24, justifyContent: "center", flexWrap: "wrap" }}>
          {[
            { key: "basic", label: t.basicReading, desc: t.basicDesc },
            { key: "advanced", label: t.advancedReading, desc: t.advancedDesc },
          ].map(m => (
            <button key={m.key} onClick={() => setMode(m.key)} style={{
              background: "rgba(196,163,90,0.05)", border: "1px solid rgba(196,163,90,0.2)",
              borderRadius: 4, padding: "28px 36px", cursor: "pointer", textAlign: "center",
              maxWidth: 280, transition: "all 0.2s ease",
            }}
              onMouseEnter={e => {
                e.currentTarget.style.background = "rgba(196,163,90,0.1)";
                e.currentTarget.style.borderColor = "rgba(196,163,90,0.4)";
              }}
              onMouseLeave={e => {
                e.currentTarget.style.background = "rgba(196,163,90,0.05)";
                e.currentTarget.style.borderColor = "rgba(196,163,90,0.2)";
              }}
            >
              <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 20, color: "#c4a35a", marginBottom: 8 }}>
                {m.label}
              </div>
              <div style={{ fontFamily: "'EB Garamond', serif", fontSize: 14, color: "#9a9590" }}>
                {m.desc}
              </div>
            </button>
          ))}
        </div>
      </div>
    );
  }

  return mode === "basic"
    ? <BasicReading t={t} onViewCard={onViewCard} />
    : <AdvancedReading t={t} onViewCard={onViewCard} />;
}

// ─────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────
function App() {
  const [lang, setLang] = useState("en");
  const [view, setView] = useState("codex");
  const [selectedCard, setSelectedCard] = useState(null);
  const t = T[lang];

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@400;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #12100e; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(196,163,90,0.2); border-radius: 3px; }
      `}</style>
      <div style={{
        minHeight: "100vh", background: "#12100e", color: "#e8e4dc",
        fontFamily: "'EB Garamond', serif",
      }}>
        {/* Header */}
        <header style={{
          borderBottom: "1px solid rgba(196,163,90,0.12)", padding: "16px 24px",
          display: "flex", alignItems: "center", justifyContent: "space-between",
          position: "sticky", top: 0, background: "rgba(18,16,14,0.95)",
          backdropFilter: "blur(8px)", zIndex: 100,
        }}>
          <div>
            <h1 style={{
              fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: 400,
              color: "#c4a35a", letterSpacing: 1,
            }}>
              {t.title}
            </h1>
            <div style={{ fontFamily: "sans-serif", fontSize: 9, color: "#6a6560", textTransform: "uppercase", letterSpacing: 3, marginTop: 2 }}>
              {t.subtitle}
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            <nav style={{ display: "flex", gap: 4 }}>
              {[{ key: "codex", label: t.codex }, { key: "reading", label: t.reading }].map(v => (
                <button key={v.key} onClick={() => setView(v.key)} style={{
                  background: view === v.key ? "rgba(196,163,90,0.12)" : "transparent",
                  border: "none", color: view === v.key ? "#c4a35a" : "#9a9590",
                  padding: "6px 16px", borderRadius: 3, cursor: "pointer",
                  fontFamily: "'EB Garamond', serif", fontSize: 15,
                  transition: "all 0.2s ease",
                }}>
                  {v.label}
                </button>
              ))}
            </nav>
            <button onClick={() => setLang(l => l === "en" ? "ru" : "en")} style={{
              background: "none", border: "1px solid rgba(196,163,90,0.2)",
              color: "#9a9590", padding: "4px 10px", borderRadius: 3, cursor: "pointer",
              fontFamily: "sans-serif", fontSize: 10, textTransform: "uppercase", letterSpacing: 1,
            }}>
              {lang === "en" ? "RU" : "EN"}
            </button>
          </div>
        </header>

        {/* Content */}
        {view === "codex"
          ? <CodexView t={t} onSelectCard={setSelectedCard} />
          : <ReadingView t={t} onViewCard={setSelectedCard} />
        }

        {/* Card Detail Drawer */}
        <CardDetail card={selectedCard} onClose={() => setSelectedCard(null)} t={t} />
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
